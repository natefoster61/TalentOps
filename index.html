<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TalentOps CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
button,select,input{font-family:inherit}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;gap:8px;flex-wrap:wrap}
.logo{font-size:16px;font-weight:700;letter-spacing:-0.5px;color:#0f172a}.logo span{color:#3b82f6}
#nav{display:flex;gap:2px;background:#f1f5f9;border-radius:8px;padding:3px;flex-wrap:wrap}
.nav-tab{font-size:12px;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:#475569;cursor:pointer;transition:all .15s}
.nav-tab.active{background:#fff;color:#0f172a;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.topbar-right{display:flex;align-items:center;gap:10px}
.save-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;transition:background .3s}
.save-dot.saving{background:#f59e0b}
.save-dot.error{background:#ef4444}
#save-label{font-size:11px;color:#94a3b8}
.btn-primary{font-size:12px;font-weight:500;padding:7px 14px;border-radius:7px;border:none;background:#3b82f6;color:#fff;cursor:pointer}
.btn-primary:hover{background:#2563eb}
.btn-sec{font-size:12px;font-weight:500;padding:7px 14px;border-radius:7px;border:1px solid #e2e8f0;background:#fff;color:#475569;cursor:pointer}
.btn-sec:hover{background:#f8fafc}
.btn-sm{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid #e2e8f0;background:transparent;color:#475569;cursor:pointer}
.btn-sm:hover{background:#f1f5f9}
.btn-danger{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid #fca5a5;background:#fef2f2;color:#ef4444;cursor:pointer}
.btn-amber{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid #fcd34d;background:#fffbeb;color:#92400e;cursor:pointer}
.btn-amber:hover{background:#fef3c7}
#metrics-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.metric-card{background:#f8fafc;border-radius:10px;padding:12px 14px;border:1px solid #e2e8f0}
.metric-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.metric-val{font-size:22px;font-weight:600;color:#0f172a;line-height:1}
.metric-sub{font-size:11px;color:#94a3b8;margin-top:3px}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}
.tbl-wrap{flex:1;overflow-y:auto;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;padding:10px 16px;text-align:left;font-weight:500;border-bottom:1px solid #e2e8f0;white-space:nowrap;background:#fff;position:sticky;top:0;z-index:1}
td{padding:10px 16px;font-size:12px;color:#475569;border-bottom:1px solid #e2e8f0;vertical-align:middle}
tr:hover td{background:#f8fafc}
.selected-row td{background:#eff6ff!important}
.mono{font-family:monospace}
.col-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e2e8f0;flex-shrink:0;background:#fff}
.col-hdr h3{font-size:13px;font-weight:600}
.filter-bar{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid #e2e8f0;flex-shrink:0;background:#fff;flex-wrap:wrap}
.chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid #e2e8f0;background:transparent;color:#475569;cursor:pointer;transition:all .12s}
.chip.on{border-color:#3b82f6;background:#eff6ff;color:#3b82f6;font-weight:500}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 8px;border-radius:999px}
.badge-blue{background:#eff6ff;color:#3b82f6;border:1px solid rgba(59,130,246,.2)}
.badge-green{background:#ecfdf5;color:#10b981;border:1px solid rgba(16,185,129,.2)}
.badge-amber{background:#fffbeb;color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.badge-red{background:#fef2f2;color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.badge-purple{background:#f5f3ff;color:#8b5cf6;border:1px solid rgba(139,92,246,.2)}
.badge-gray{background:#f1f5f9;color:#64748b;border:1px solid rgba(100,116,139,.2)}
.badge-orange{background:#fff7ed;color:#f97316;border:1px solid rgba(249,115,22,.2)}
.isel{font-size:11px;font-weight:500;font-family:inherit;border-radius:999px;padding:3px 9px;cursor:pointer;appearance:none;outline:none;border:1px solid}
.split{display:flex;flex:1;overflow:hidden}
.split-l{width:54%;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
.split-r{flex:1;display:flex;flex-direction:column;overflow:hidden}
.detail-scroll{flex:1;overflow-y:auto}
.detail-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-meta-item{background:#f8fafc;border-radius:8px;padding:8px 10px}
.detail-meta-key{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;font-weight:500}
.detail-meta-val{font-size:12px;font-weight:600;color:#0f172a}
.cand-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #e2e8f0}
.cand-row:hover{background:#f8fafc}
.avatar{width:30px;height:30px;border-radius:50%;background:#eff6ff;color:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.cand-info{flex:1;min-width:0}
.cand-name{font-size:12px;font-weight:500;color:#0f172a}
.cand-sub{font-size:11px;color:#94a3b8;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:#94a3b8;font-size:13px;gap:10px;text-align:center}
.empty-icon{font-size:28px}
.pipeline-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.pipe-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pipe-num{font-size:30px;font-weight:700;line-height:1;margin-bottom:6px;font-variant-numeric:tabular-nums}
.pipe-label{font-size:12px;color:#475569;font-weight:500}
.stat-card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-label{font-size:11px;font-weight:500;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-val{font-size:24px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:#94a3b8;margin-top:5px}
.stat-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
#comm-tracker{border-top:1px solid #e2e8f0;background:#f8fafc;flex-shrink:0;padding:14px 18px 16px}
.comm-tier-bars{display:flex;gap:3px;align-items:flex-end;height:36px;margin-bottom:10px}
.tier-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.tier-pct-label{font-size:8px;font-family:monospace;color:#94a3b8}
.tier-pct-label.active{color:#10b981}
.tier-bar{width:100%;border-radius:2px 2px 0 0}
.comm-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.comm-stat{background:#fff;border-radius:8px;padding:9px 11px;border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.comm-stat-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:500}
.comm-stat-val{font-size:15px;font-weight:600;font-family:monospace;color:#0f172a}
.comm-stat-val.green{color:#10b981}
.sub-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.progress-wrap{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}
.progress-bar-bg{height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:10px 0 6px}
.progress-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#3b82f6,#10b981);transition:width .5s}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:200;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:#fff;border-radius:14px;width:540px;max-width:96vw;padding:24px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);border:1px solid #e2e8f0}
.modal-title{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{font-size:11px;color:#475569;font-weight:500;display:block;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:8px 11px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc;color:#0f172a;font-size:12px}
.fg input:focus,.fg select:focus{border-color:#3b82f6;background:#fff;outline:none}
.fg input[readonly]{background:#f1f5f9;color:#64748b}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.divider{height:1px;background:#e2e8f0;margin:14px 0}
.sec-lbl{font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:block}
.preview-box{background:#f0fdf4;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;border:1px solid #bbf7d0}
.preview-row{display:flex;justify-content:space-between;padding:2px 0;color:#166534}
.preview-val{font-weight:600;font-family:monospace}
#view-ytd{overflow-y:auto}
.ytd-inner{padding:20px}
.section-hdr{font-size:12px;font-weight:600;color:#475569;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.card-wrap{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
#loading{position:fixed;inset:0;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:14px;color:#94a3b8;z-index:999}
@media(max-width:800px){.split-l{width:100%}.split-r{display:none}#metrics-bar,.sub-metrics,.stat-grid-4{grid-template-columns:repeat(2,1fr)}.stat-grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loading">Loading TalentOps…</div>
<div id="app" style="display:none">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="logo">Talent<span>Ops</span></div>
      <div style="width:1px;height:18px;background:#e2e8f0"></div>
      <div id="nav"></div>
    </div>
    <div class="topbar-right">
      <span class="save-dot" id="save-dot"></span>
      <span id="save-label">Live</span>
      <button class="btn-sec" onclick="openModal('job')">+ New Job</button>
      <button class="btn-primary" onclick="openModal('candidate')">+ Submittal</button>
    </div>
  </div>
  <div id="metrics-bar"></div>
  <div id="main">
    <div class="view" id="view-jobs">
      <div class="split">
        <div class="split-l">
          <div class="col-hdr"><h3>Open Requisitions</h3><span class="badge badge-blue" id="jobs-badge">0 active</span></div>
          <div class="filter-bar" id="job-filter-bar"></div>
          <div class="tbl-wrap" id="jobs-table-wrap"></div>
        </div>
        <div class="split-r">
          <div class="col-hdr"><h3>Job Details</h3><button class="btn-primary" style="font-size:11px;padding:5px 11px" onclick="openSubmittalForSelected()">+ Submittal</button></div>
          <div class="detail-scroll" id="detail-panel"><div class="empty"><span class="empty-icon">👈</span><span>Select a job to view details</span></div></div>
        </div>
      </div>
    </div>
    <div class="view" id="view-candidates">
      <div class="filter-bar" id="cand-filter-bar"></div>
      <div class="tbl-wrap" id="cands-table-wrap"></div>
    </div>
    <div class="view" id="view-pipeline">
      <div style="flex:1;overflow-y:auto;padding:16px" id="pipeline-inner"></div>
    </div>
    <div class="view" id="view-contractors">
      <div class="sub-metrics" id="ctr-metrics"></div>
      <div class="col-hdr"><h3>Active Contractors</h3><button class="btn-primary" style="font-size:11px;padding:5px 11px" onclick="openModal('contractor')">+ Add Contractor</button></div>
      <div class="tbl-wrap" id="ctrs-table-wrap"></div>
      <div id="comm-tracker"></div>
    </div>
    <div class="view" id="view-ytd"><div class="ytd-inner" id="ytd-inner"></div></div>
    <div class="view" id="view-archive">
      <div class="col-hdr"><h3>Archived Jobs <span id="archive-count" style="font-size:11px;color:#94a3b8;font-weight:400;margin-left:6px"></span></h3><span style="font-size:11px;color:#94a3b8">Change status to restore to Active Jobs</span></div>
      <div class="filter-bar" id="archive-filter-bar"></div>
      <div class="tbl-wrap" id="archive-table-wrap"></div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modal-save-btn">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ─────────────────────────────────────────────────────────────────────
const BASE_SALARY = 50000;
let jobs=[], candidates=[], contractors=[], offboarded=[], placements=[];
let currentView='jobs', jobFilter='all', candFilter='all', archiveFilter='all', selJobId=null;
let modalType='', modalEditId=null;

const JOB_STATUSES=['Cover','Need Feedback','Interviewing','Placed','On Hold','Archive'];
const JOB_STATUS_COL={'Cover':'#3b82f6','Need Feedback':'#f59e0b','Interviewing':'#8b5cf6','Placed':'#10b981','On Hold':'#94a3b8','Archive':'#64748b'};
const STAGE_COL={'Submitted':'#3b82f6','Phone Screen':'#f59e0b','Interview':'#8b5cf6','Offer Extended':'#f97316','Placed':'#10b981','Declined':'#ef4444'};
const STATUSES=['Submitted','Phone Screen','Interview','Offer Extended','Placed','Declined'];
const REL_OPTS=['25','50','100'];
const PLAC_TYPES=['Double-Sided','Recruiting','Sales'];
const TIERS=[{min:0,max:999,rate:.15},{min:1000,max:1999,rate:.16},{min:2000,max:2999,rate:.17},{min:3000,max:3999,rate:.18},{min:4000,max:4999,rate:.19},{min:5000,max:5999,rate:.20},{min:6000,max:7499,rate:.21},{min:7500,max:Infinity,rate:.22}];

// ── Math ──────────────────────────────────────────────────────────────────────
const billFromMarkup=(pay,mu)=>parseFloat(pay||0)*(1+(parseFloat(mu||0)/100));
const markupFromRates=(pay,bill)=>pay>0?((bill-pay)/pay*100):0;
const netHrFn=(pay,bill)=>(bill-pay)*0.80;
const creditedHr=(pay,bill,rel)=>netHrFn(pay,bill)*(parseFloat(rel||100)/100);
function weeksBetween(startStr,endStr){
  if(!startStr)return 0;
  const parse=s=>{const p=s.split('/');return p.length===3?new Date(p[2],p[0]-1,p[1]):new Date(s);};
  const s=parse(startStr);
  const e=endStr?parse(endStr):new Date(new Date().getFullYear(),11,31);
  const ms=e-s;return ms<=0?0:ms/(7*24*60*60*1000);
}
const activeGM=c=>{const p=parseFloat(c.pay_rate)||0,b=parseFloat(c.bill_rate)||0;if(!p||!b)return 0;return creditedHr(p,b,c.rel_pct||100)*40*weeksBetween(c.start_date,null);};
const offboardedGM=o=>{const p=parseFloat(o.pay_rate)||0,b=parseFloat(o.bill_rate)||0;if(!p||!b)return 0;return creditedHr(p,b,o.rel_pct||100)*40*weeksBetween(o.start_date,o.end_date);};
const weeklyBillings=c=>{const p=parseFloat(c.pay_rate)||0,b=parseFloat(c.bill_rate)||0;if(!p||!b)return 0;return creditedHr(p,b,c.rel_pct||100)*40;};
const getTier=w=>TIERS.find(t=>w>=t.min&&w<=t.max)||TIERS[0];
const commOnWeekly=w=>w*getTier(w).rate;
const calcPermBilling=(salary,feePct,relPct)=>{const s=parseFloat(String(salary||'').replace(/[^0-9.]/g,''))||0;return s*(parseFloat(feePct)||0)/100*(parseFloat(relPct)||100)/100;};
const fmt$=(n,d=0)=>'$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtHr=n=>n?'$'+parseFloat(n).toFixed(2)+'/hr':'—';
const ini=n=>(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const todayStr=()=>{const d=new Date();return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();};
const toDateInput=s=>{if(!s)return'';try{const p=s.split('/');if(p.length===3)return`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;}catch{}return s;};
const currYear=()=>new Date().getFullYear();
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Supabase helpers ──────────────────────────────────────────────────────────
function setSyncing(v,error=false){
  const dot=document.getElementById('save-dot');
  const lbl=document.getElementById('save-label');
  if(error){dot.className='save-dot error';lbl.textContent='Error';}
  else if(v){dot.className='save-dot saving';lbl.textContent='Saving…';}
  else{dot.className='save-dot';lbl.textContent='Live';}
}

async function fetchAll(){
  setSyncing(true);
  try{
    const [j,c,ct,ob,pl]=await Promise.all([
      sb.from('jobs').select('*').order('created_at',{ascending:false}),
      sb.from('candidates').select('*').order('date_added',{ascending:false}),
      sb.from('contractors').select('*').order('start_date',{ascending:false}),
      sb.from('offboarded').select('*').order('start_date',{ascending:false}),
      sb.from('placements').select('*').order('start_date',{ascending:false}),
    ]);
    jobs=j.data||[]; candidates=c.data||[]; contractors=ct.data||[]; offboarded=ob.data||[]; placements=pl.data||[];
    setSyncing(false);
  }catch(e){setSyncing(false,true);}
}

async function dbUpsert(table,record){
  setSyncing(true);
  const{error}=await sb.from(table).upsert(record);
  if(error){setSyncing(false,true);console.error(error);return false;}
  setSyncing(false);return true;
}
async function dbDelete(table,id){
  setSyncing(true);
  const{error}=await sb.from(table).delete().eq('id',id);
  if(error){setSyncing(false,true);console.error(error);return false;}
  setSyncing(false);return true;
}

// ── Badges ────────────────────────────────────────────────────────────────────
function colClass(col){const m={'#3b82f6':'badge-blue','#10b981':'badge-green','#f59e0b':'badge-amber','#ef4444':'badge-red','#8b5cf6':'badge-purple','#f97316':'badge-orange','#64748b':'badge-gray','#94a3b8':'badge-gray'};return'badge '+(m[col]||'badge-gray');}
const typeBadge=t=>`<span class="${t==='Permanent'?'badge badge-green':'badge badge-purple'}">${esc(t||'—')}</span>`;
const urgBadge=u=>`<span class="${u==='Hot'?'badge badge-red':u==='Warm'?'badge badge-amber':'badge badge-gray'}">${esc(u||'—')}</span>`;
const jobStatusBadge=s=>`<span class="${colClass(JOB_STATUS_COL[s])}">${esc(s||'—')}</span>`;
const placBadge=p=>`<span class="${p==='Double-Sided'?'badge badge-blue':p==='Recruiting'?'badge badge-amber':'badge badge-purple'}">${esc(p||'—')}</span>`;

function jobStatusSelHTML(jobId,current){
  const col=JOB_STATUS_COL[current]||'#94a3b8';
  return`<select class="isel" style="background:${col}14;color:${col};border-color:${col}40" onchange="window.changeJobStatus('${jobId}',this.value)" onclick="event.stopPropagation()">${JOB_STATUSES.map(s=>`<option value="${esc(s)}"${s===current?' selected':''}>${esc(s)}</option>`).join('')}</select>`;
}
function statusSelHTML(candId,current){
  const col=STAGE_COL[current]||'#94a3b8';
  return`<select class="isel" style="background:${col}14;color:${col};border-color:${col}40" onchange="window.changeCandStatus('${candId}',this.value)" onclick="event.stopPropagation()">${STATUSES.map(s=>`<option value="${esc(s)}"${s===current?' selected':''}>${esc(s)}</option>`).join('')}</select>`;
}

// ── Status handlers ───────────────────────────────────────────────────────────
window.changeJobStatus=async(jobId,newStatus)=>{
  const j=jobs.find(x=>x.id===jobId);if(!j)return;
  const archived=newStatus==='Placed'||newStatus==='Archive';
  j.job_status=newStatus;j.archived=archived;
  renderAll();
  await dbUpsert('jobs',{...j,job_status:newStatus,archived});
};

window.changeCandStatus=async(candId,newStatus)=>{
  const c=candidates.find(x=>x.id===candId);if(!c)return;
  c.candidate_status=newStatus;
  renderAll();
  await dbUpsert('candidates',{...c,candidate_status:newStatus});
  if(newStatus==='Placed'&&c.job_type==='Contract') await autoAddContractor(c);
};

async function autoAddContractor(cand){
  if(contractors.find(c=>c.candidate_id===cand.id))return;
  const job=jobs.find(j=>j.id===cand.job_id);
  const rec={id:uid(),candidate_id:cand.id,name:cand.name,client:cand.job_client||'',role:cand.job_title||'',start_date:todayStr(),pay_rate:cand.pay_rate||job?.pay_rate||'',markup:cand.markup||job?.markup||'',bill_rate:cand.bill_rate||job?.bill_rate||'',placement_type:'Double-Sided',rel_pct:'100',notes:cand.notes||''};
  contractors.push(rec);
  renderAll();
  await dbUpsert('contractors',rec);
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function renderNav(){
  const tabs=[['jobs','Active Jobs'],['candidates','Candidates'],['pipeline','Pipeline'],['contractors','Contractors'],['ytd','Year to Date'],['archive','Archive']];
  document.getElementById('nav').innerHTML=tabs.map(([v,l])=>`<button class="nav-tab${currentView===v?' active':''}" onclick="window.switchView('${v}')">${l}</button>`).join('');
}
window.switchView=v=>{
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  renderNav();
  if(v==='pipeline')renderPipeline();
  if(v==='ytd')renderYTD();
  if(v==='archive')renderArchive();
};

// ── Jobs view ─────────────────────────────────────────────────────────────────

  const active=jobs.filter(j=>!j.archived);

  const filters=['all','hot','permanent','contract',...JOB_STATUSES.filter(s=>s!=='Archive')];
  document.getElementById('job-filter-bar').innerHTML=filters.map(f=>`<button class="chip${jobFilter===f?' on':''}" onclick="window.setJobFilter('${f}')">${f==='all'?'All':f}</button>`).join('');
  let filtered=active.filter(j=>{
    if(jobFilter==='all')return true;
    if(jobFilter==='hot')return j.urgency==='Hot';
    if(jobFilter==='permanent')return j.type==='Permanent';
    if(jobFilter==='contract')return j.type==='Contract';
    return j.job_status===jobFilter;
  });
  const wrap=document.getElementById('jobs-table-wrap');
  if(filtered.length===0){wrap.innerHTML=`<div class="empty"><span class="empty-icon">📋</span><span>${active.length===0?'No jobs yet — click + New Job':'No jobs match this filter'}</span></div>`;renderDetailPanel();return;}
  wrap.innerHTML=`<table><thead><tr><th>Job / Client</th><th>Status</th><th>Type</th><th>Pay Rate</th><th>Markup%</th><th>Bill Rate</th><th></th></tr></thead><tbody>
    ${filtered.map(j=>{

        <td>${typeBadge(j.type)}</td>
        <td class="mono" style="font-size:11px">${j.type==='Contract'?(pay?fmtHr(pay):'—'):(j.salary_range||'TBD')}</td>

  const jCands=candidates.filter(c=>c.job_id===j.id);

  const meta=[
    j.type==='Contract'?['Pay Rate',pay?fmtHr(pay):'TBD']:['Salary',j.salary_range||'TBD'],

  const potBilling=active.reduce((s,j)=>{
    if(j.type==='Contract'){const p=parseFloat(j.pay_rate)||0,b=parseFloat(j.bill_rate)||0;return s+(p&&b?netHrFn(p,b)*(parseFloat(j.rel_pct||100)/100)*40:0);}
    return s+calcPermBilling(j.salary_range,j.fee_pct,j.rel_pct||100);
  },0);
  document.getElementById('pipeline-inner').innerHTML=`
    <div class="stat-grid-3">

window.removeContractor=async id=>{if(!confirm('Remove this contractor?'))return;contractors=contractors.filter(c=>c.id!==id);renderAll();await dbDelete('contractors',id);};

window.openOffboard=id=>{
  const c=contractors.find(x=>x.id===id);if(!c)return;
  modalType='offboard';modalEditId=id;
  document.getElementById('modal-title').textContent='Offboard Contractor';
  document.getElementById('modal-body').innerHTML=`
    <div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#92400e">
      Moving <strong>${esc(c.name)}</strong> to YTD records. GM will be calculated from start date to end date.
    </div>
    <div class="form-row">
      <div class="fg"><label>Contractor</label><input readonly value="${esc(c.name)}"/></div>
      <div class="fg"><label>Client</label><input readonly value="${esc(c.client)}"/></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Pay Rate</label><input readonly value="${esc(fmtHr(c.pay_rate))}"/></div>
      <div class="fg"><label>Bill Rate</label><input readonly value="${esc(fmtHr(c.bill_rate))}"/></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Start Date</label><input readonly value="${esc(c.start_date||'')}"/></div>
      <div class="fg"><label>End Date <span style="color:#ef4444">*</span></label><input id="ob-end" type="date" required/></div>
    </div>
    <div class="fg"><label>Notes</label><input id="ob-notes" value="${esc(c.notes||'')}" placeholder="Reason for offboarding…"/></div>`;
  document.getElementById('modal-save-btn').textContent='Offboard';
  document.getElementById('modal-save-btn').onclick=submitOffboard;

async function submitOffboard(){
  const endDate=document.getElementById('ob-end')?.value;
  if(!endDate){alert('Please enter an end date.');return;}
  const notes=document.getElementById('ob-notes')?.value.trim()||'';
  const c=contractors.find(x=>x.id===modalEditId);if(!c)return;
  const rec={...c,end_date:endDate,notes,offboarded_at:todayStr(),year:currYear()};
  offboarded.push(rec);
  contractors=contractors.filter(x=>x.id!==modalEditId);
  renderAll();
  closeModal();
  await dbUpsert('offboarded',rec);
  await dbDelete('contractors',modalEditId);
}

function renderCommTracker(totWeekly){
  const t=getTier(totWeekly);const we=totWeekly*t.rate;
  const bars=TIERS.map((tr,i)=>{const isA=tr===t,isPast=i<TIERS.indexOf(t);const h=Math.max(6,Math.round((i+1)/TIERS.length*30));return`<div class="tier-wrap"><span class="tier-pct-label${isA?' active':''}">${Math.round(tr.rate*100)}%</span><div class="tier-bar" style="height:${h}px;background:${isA?'#10b981':isPast?'#bbf7d0':'#e2e8f0'}"></div></div>`;}).join('');
  document.getElementById('comm-tracker').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;font-weight:600;color:#0f172a">Commission Tracker — Active Contractors Only</span>
      <span style="font-size:11px;color:#94a3b8">${totWeekly>0?fmt$(totWeekly,0)+'/wk — '+Math.round(t.rate*100)+'% tier':'Add contractors to calculate'}</span>
    </div>
    <div class="comm-tier-bars">${bars}</div>
    <div class="comm-stats-grid">${[['Weekly Billings',fmt$(totWeekly,0),false],['Commission Rate',Math.round(t.rate*100)+'%',true],['Weekly Commission',fmt$(we,2),true],['Monthly Commission',fmt$(we*4.33,2),true]].map(([l,v,hi])=>`<div class="comm-stat"><div class="comm-stat-label">${l}</div><div class="comm-stat-val${hi?' green':''}">${v}</div></div>`).join('')}</div>`;
}

// ── YTD ───────────────────────────────────────────────────────────────────────
function renderYTD(){
  const year=currYear();
  const ytdP=placements.filter(p=>p.year===year||!p.year);
  const ytdOff=offboarded.filter(o=>o.year===year||!o.year);
  const permFees=ytdP.reduce((s,p)=>s+calcPermBilling(p.salary_range,p.fee_pct,parseFloat(p.rel_pct)||100),0);
  const offGM=ytdOff.reduce((s,o)=>s+offboardedGM(o),0);
  let totWeekly=0;contractors.forEach(c=>{totWeekly+=weeklyBillings(c);});
  const activeComm=commOnWeekly(totWeekly)*52;
  const total=BASE_SALARY+permFees+offGM+activeComm;
  const target=BASE_SALARY*2;const pct=Math.min(100,Math.round(total/target*100));

  const activeCtrRows=contractors.length===0?'':`
    <div class="section-hdr">Active Contractors (projected to Dec 31)</div>
    <div class="card-wrap"><table><thead><tr><th>Contractor</th><th>Client</th><th>Start Date</th><th>Weeks Remaining</th><th>YTD GM</th><th>Est. Annual Commission</th></tr></thead><tbody>
      ${contractors.map(c=>{const wks=weeksBetween(c.start_date,null);const gm=activeGM(c);return`<tr><td style="font-weight:500;color:#0f172a">${esc(c.name)}</td><td>${esc(c.client)}</td><td class="mono" style="font-size:11px">${esc(c.start_date||'—')}</td><td class="mono" style="font-size:11px">${wks.toFixed(1)}</td><td class="mono" style="font-weight:600;color:#10b981">${fmt$(gm,0)}</td><td class="mono" style="font-weight:600;color:#3b82f6">${fmt$(commOnWeekly(weeklyBillings(c))*52,0)}</td></tr>`;}).join('')}
    </tbody></table></div>`;

  const offRows=ytdOff.length===0?'':`
    <div class="section-hdr">Offboarded Contractors — ${year}</div>
    <div class="card-wrap"><table><thead><tr><th>Contractor</th><th>Client</th><th>Placement</th><th>Rel%</th><th>Start</th><th>End</th><th>Weeks</th><th>GM Earned</th><th></th></tr></thead><tbody>
      ${ytdOff.map(o=>{const wks=weeksBetween(o.start_date,o.end_date);const gm=offboardedGM(o);return`<tr>
        <td style="font-weight:500;color:#0f172a">${esc(o.name)}</td><td>${esc(o.client)}</td>

// ── Preview helpers ───────────────────────────────────────────────────────────
function feePreviewHTML(salary,feePct,relPct){
  const b=calcPermBilling(salary,feePct,relPct);if(!b)return'';
  const full=calcPermBilling(salary,feePct,100);let rows='';
  if(String(relPct)!=='100')rows+=`<div class="preview-row">Full fee (100%)<span class="preview-val">${fmt$(full,0)}</span></div>`;
  rows+=`<div class="preview-row">Your billing (${relPct}%)<span class="preview-val">${fmt$(b,0)}</span></div>`;
  return`<div class="preview-box">${rows}</div>`;
}
function spreadPreviewHTML(pay,bill,relPct){
  const p=parseFloat(pay)||0,b=parseFloat(bill)||0;if(!p||!b)return'';
  const rel=(parseFloat(relPct)||100)/100,raw=b-p,net=raw*.8,cred=net*rel;
  return`<div class="preview-box"><div class="preview-row">Raw spread<span class="preview-val">$${raw.toFixed(2)}/hr</span></div><div class="preview-row">Net (20% burden)<span class="preview-val">$${net.toFixed(2)}/hr</span></div><div class="preview-row">Credited (${Math.round(rel*100)}%)<span class="preview-val">$${cred.toFixed(2)}/hr</span></div><div class="preview-row">Weekly GM<span class="preview-val">${fmt$(cred*40,2)}</span></div></div>`;
}

window.updateModalDynamics=()=>{
  if(modalType==='job'){
    const jt=document.getElementById('m-type')?.value;
    const rel=document.getElementById('m-relpct')?.value||'100';
    const comp=document.getElementById('m-comp-section');if(!comp||!jt)return;
    const hasPayRate=!!document.getElementById('m-payrate');
    const hasSalary=!!document.getElementById('m-salary');
    const mismatch=(jt==='Contract'&&!hasPayRate)||(jt==='Permanent'&&!hasSalary);
    if(mismatch){
      if(jt==='Contract'){comp.innerHTML=`<div class="form-row-3"><div class="fg"><label>Pay Rate ($/hr)</label><input id="m-payrate" type="number" min="0" step=".25" placeholder="e.g. 20" oninput="calcBillRate()"/></div><div class="fg"><label>Markup %</label><input id="m-markup" type="number" min="0" step=".5" placeholder="e.g. 60" oninput="calcBillRate()"/></div><div class="fg"><label>Bill Rate ($/hr)</label><input id="m-billrate" type="number" min="0" step=".01" placeholder="calculated" readonly style="background:#f1f5f9;color:#64748b"/></div></div><div id="m-spread-preview"></div>`;}
      else{comp.innerHTML=`<div class="form-row"><div class="fg"><label>Salary</label><input id="m-salary" placeholder="e.g. 100000" oninput="updateModalDynamics()"/></div><div class="fg"><label>Fee %</label><input id="m-feepct" type="number" min="0" max="100" step=".5" placeholder="e.g. 20" oninput="updateModalDynamics()"/></div></div><div id="m-fee-preview"></div>`;}
    }
    if(jt==='Contract'){window.calcBillRate();}
    else{const s=document.getElementById('m-salary')?.value,f=document.getElementById('m-feepct')?.value;const el=document.getElementById('m-fee-preview');if(el)el.innerHTML=feePreviewHTML(s,f,rel);}
  }
  if(modalType==='candidate'){
    const jobId=document.getElementById('m-job')?.value;
    const j=jobs.find(x=>x.id===jobId);
    const sec=document.getElementById('m-cand-pay-section');
    if(sec&&j){
      if(j.type==='Contract'&&!sec.querySelector('#m-payrate')){sec.innerHTML=`<div class="form-row-3"><div class="fg"><label>Pay Rate ($/hr)</label><input id="m-payrate" type="number" min="0" step=".25" placeholder="65"/></div><div class="fg"><label>Markup %</label><input id="m-markup" type="number" min="0" step=".5" placeholder="60" oninput="calcCandBillRate()"/></div><div class="fg"><label>Bill Rate ($/hr)</label><input id="m-billrate" type="number" min="0" step=".01" placeholder="auto"/></div></div>`;}
      else if(j.type!=='Contract'&&!sec.querySelector('#m-pay')){sec.innerHTML=`<div class="fg"><label>Salary</label><input id="m-pay" type="text" placeholder="e.g. $90,000"/></div>`;}
    }
  }
  if(modalType==='contractor'){window.calcCtrBillRate();}
  if(modalType==='placement'){const s=document.getElementById('m-salary')?.value,f=document.getElementById('m-feepct')?.value,rel=document.getElementById('m-relpct')?.value||'100';const el=document.getElementById('m-fee-preview');if(el)el.innerHTML=feePreviewHTML(s,f,rel);}
};

async function submitModal(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  if(modalType==='job'){
    const title=g('m-title'),client=g('m-client');if(!title||!client){alert('Please enter a job title and client.');return;}
    const jt=g('m-type')||'Permanent',js=g('m-jstatus')||'Cover';
    const rec={id:modalEditId||uid(),title,client,type:jt,urgency:g('m-urgency')||'Standard',rel_pct:g('m-relpct')||'100',job_status:js,archived:(js==='Placed'||js==='Archive'),location:g('m-location')||null,salary_range:jt==='Permanent'?g('m-salary')||null:null,fee_pct:jt==='Permanent'?g('m-feepct')||null:null,pay_rate:jt==='Contract'?g('m-payrate')||null:null,markup:jt==='Contract'?g('m-markup')||null:null,bill_rate:jt==='Contract'?g('m-billrate')||null:null,created_at:modalEditId?jobs.find(j=>j.id===modalEditId)?.created_at||todayStr():todayStr()};
    if(modalEditId)jobs=jobs.map(j=>j.id===modalEditId?rec:j);else jobs.push(rec);
    renderAll();closeModal();await dbUpsert('jobs',rec);
  }else if(modalType==='candidate'){
    const name=g('m-name');if(!name){alert('Please enter a candidate name.');return;}
    const jobId=g('m-job'),j=jobs.find(x=>x.id===jobId);
    const rec={id:modalEditId||uid(),name,job_id:jobId||null,job_title:j?.title||null,job_client:j?.client||null,job_type:j?.type||null,candidate_status:g('m-cstatus')||'Submitted',pay_rate:g('m-payrate')||null,markup:g('m-markup')||null,bill_rate:g('m-billrate')||null,salary:g('m-pay')||null,notes:g('m-notes')||null,date_added:modalEditId?candidates.find(c=>c.id===modalEditId)?.date_added||todayStr():todayStr()};
    if(modalEditId)candidates=candidates.map(c=>c.id===modalEditId?rec:c);else candidates.push(rec);
    renderAll();closeModal();
    await dbUpsert('candidates',rec);
    if(rec.candidate_status==='Placed'&&rec.job_type==='Contract')await autoAddContractor(rec);
  }else if(modalType==='contractor'){
    const name=g('m-name'),client=g('m-client');if(!name||!client){alert('Please enter name and client.');return;}
    const sdRaw=g('m-startdate');const sdFmt=sdRaw?(()=>{const d=new Date(sdRaw+'T00:00:00');return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();})():'';
    const rec={id:modalEditId||uid(),name,client,role:g('m-role')||null,start_date:sdFmt||null,pay_rate:g('m-payrate')||null,markup:g('m-markup')||null,bill_rate:g('m-billrate')||null,placement_type:g('m-plactype')||'Double-Sided',rel_pct:g('m-relpct')||'100',notes:g('m-notes')||null,candidate_id:modalEditId?contractors.find(c=>c.id===modalEditId)?.candidate_id||null:null};
    if(modalEditId)contractors=contractors.map(c=>c.id===modalEditId?rec:c);else contractors.push(rec);
    renderAll();closeModal();await dbUpsert('contractors',rec);
  }else if(modalType==='placement'){
    const title=g('m-title');if(!title){alert('Please enter a role/job title.');return;}
    const sdRaw=g('m-startdate');const sdFmt=sdRaw?(()=>{const d=new Date(sdRaw+'T00:00:00');return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();})():'';
    const rec={id:modalEditId||uid(),title,candidate_name:g('m-candname')||null,client:g('m-client')||null,type:'Permanent',rel_pct:g('m-relpct')||'100',start_date:sdFmt||null,salary_range:g('m-salary')||null,fee_pct:g('m-feepct')||null,notes:g('m-notes')||null,year:currYear()};
    if(modalEditId)placements=placements.map(p=>p.id===modalEditId?rec:p);else placements.push(rec);
    renderYTD();closeModal();await dbUpsert('placements',rec);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
await fetchAll();
document.getElementById('loading').style.display='none';
document.getElementById('app').style.display='flex';
window.switchView('jobs');
renderAll();
</script>
